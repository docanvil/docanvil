name: Build and Publish to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - "docs/**"        # 👈 folder to watch for changes
      - ".github/workflows/publish-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install docanvil from latest release
        run: |
          LATEST=$(curl -sSf https://api.github.com/repos/docanvil/docanvil/releases/latest \
            | grep '"tag_name"' | sed 's/.*"tag_name": *"\(.*\)".*/\1/')
          VERSION=${LATEST#v}
          curl -sSfL "https://github.com/docanvil/docanvil/releases/download/${LATEST}/docanvil-v${VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C /usr/local/bin

      - name: Run tool
        working-directory: ./docs
        run: |
          docanvil build --strict --out public                  # 👈 output folder (example)

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/public                       # 👈 directory to publish

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
